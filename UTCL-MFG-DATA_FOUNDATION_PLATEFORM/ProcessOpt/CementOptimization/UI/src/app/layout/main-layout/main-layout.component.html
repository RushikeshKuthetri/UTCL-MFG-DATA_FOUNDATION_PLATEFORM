<div class="flex flex-col h-screen overflow-hidden bg-[var(--bg-color)]">
  <!-- HEADER -->
  <app-header></app-header>

  <!-- BODY -->
  <div class="flex flex-1 overflow-hidden">
    <!-- SIDEBAR -->
    <app-left-drawer [open]="mobileOpen" (openChange)="mobileOpen = $event" [collapsed]="sidebrCollapsed"
      (collapsedChange)="sidebrCollapsed = $event"></app-left-drawer>

    <!-- CONTENT AREA -->
    <div class="flex-1 flex flex-col overflow-hidden transition-all duration-300" [ngClass]="{
        'lg:ml-60': !sidebrCollapsed,
        'lg:ml-20': sidebrCollapsed
      }">
      <!-- TOP BAR -->
      <!-- <div
        class="flex items-center justify-between pr-6 pl-4 pt-3 shrink-0 text-[var(--text-color)]"
      >
        <div class="text-sm font-semibold">Process Optimization</div>
      </div> -->

      <div class="flex items-center justify-between pr-4 ml-2.5 mt-1 mb-0 shrink-0">
        <app-breadcrumb></app-breadcrumb>
        <app-searchbar></app-searchbar>
      </div>

      <!-- MAIN AREA -->
      <main class=" h-[84vh] flex flex-col overflow-hidden px-2 sm:px-3 pl-1 lg:pr-6 lg:pl-2 pb-2 sm:pb-3">
        <!-- SCROLLABLE CONTAINER -->
        <div
          class="custom-scrollbar flex-1 mt-1 rounded-xl sm:rounded-xl bg-[var(--bg-main-container)] [box-shadow:var(--left-drawer-shadow)] transition-all duration-300 overflow-y-auto scroll-smooth w-full mx-auto lg:max-w-[1400px] xl:max-w-[1700px]">
          <!-- Breadcrumb -->
          <div class="mb-2 sm:mb-3">
            <!-- <app-breadcrumb></app-breadcrumb> -->
          </div>

          <!-- Routed Page Content -->
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>
  </div>

  <!-- FOOTER -->
  <app-footer></app-footer>
</div>
