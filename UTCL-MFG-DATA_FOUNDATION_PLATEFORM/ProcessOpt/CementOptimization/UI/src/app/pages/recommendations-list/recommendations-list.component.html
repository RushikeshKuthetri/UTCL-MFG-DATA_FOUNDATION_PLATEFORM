        <a
          (click)="downloadRecommendationData()"
          [hidden]="recommendationDataSource.length == 0"
        >
          <span
            class="material download material-symbols-outlined text-[30px] flex justify-end text-[var(--text-color)] mb-2 mr-2 cursor-pointer"
          >
            download
          </span>
        </a>

        <div
          class="m-3 mr-2 overflow-hidden flex flex-col max-h-[590px] rounded-lg"
        >
          <div class="overflow-auto flex-1 rounded-lg">
            <table
              class="border-collapse w-full rounded-lg border border-[var(--form-border)]"
              mat-table
              matSort
              (matSortChange)="sortData($event)"
              [dataSource]="dataSource"
              [hidden]="recommendationDataSource.length == 0"
            >
              <ng-container
                [matColumnDef]="item"
                *ngFor="let item of keysList; let i = index"
              >
                <th
                  class="text-[13px] text-left px-3 py-2 font-semibold whitespace-nowrap border-b border-[var(--form-border)] sticky top-0 z-10 bg-[var(--header-bg)]"
                  mat-header-cell
                  [mat-sort-header]="item"
                  *matHeaderCellDef
                >
                  {{ displayedColumn[i] }}
                </th>
                <td
                  mat-cell
                  *matCellDef="let element"
                  class="text-[12px] px-3 py-2 whitespace-nowrap text-[var(--text-color)]"
                >
                  {{ element[item] ? element[item] : "N/A" }}
                </td>
              </ng-container>
              <tr
                mat-header-row
                *matHeaderRowDef="keysList; sticky: true"
                class="border-b border-[var(--form-border)]"
              ></tr>
              <tr
                mat-row
                *matRowDef="let row; columns: keysList"
                class="text-[13px] border-b border-[var(--form-border)] transition"
              ></tr>
            </table>
          </div>
        </div>

        <div
          class="text-[var(--text-color)] justify-content-end text-[12px] -mt-2"
          [hidden]="recommendationDataSource.length == 0"
        >
          <mat-paginator
            [length]="100"
            [pageSize]="10"
            #paginator
            [hidden]="recommendationDataSource.length == 0"
            [pageSizeOptions]="[5, 10, 25, 100]"
            aria-label="Select page"
          >
          </mat-paginator>
        </div>
        <!-- </div> -->
        <div
          class="m-3 flex flex-col items-center justify-center py-3 px-6 text-center border border-dashed border-[var(--form-border)] rounded-xl transition-all duration-300 animate-fadeIn"
          [hidden]="recommendationDataSource.length !== 0"
        >
          <!-- Icon -->
          <div class="text-3xl mb-3 zoom-animation">🔍</div>

          <!-- Title -->
          <h2 class="text-lg font-semibold text-[var(--leftdrawer-text)] mb-2">
            No Data Found
          </h2>

          <!-- Description -->
          <p class="text-sm text-[var(--card-subtle)] mb-1">
            Try changing the filters or refresh the data
          </p>
        </div>
