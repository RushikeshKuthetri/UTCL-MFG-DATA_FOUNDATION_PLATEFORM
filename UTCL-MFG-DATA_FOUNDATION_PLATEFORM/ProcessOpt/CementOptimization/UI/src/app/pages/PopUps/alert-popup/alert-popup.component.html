<div class="modal-header">
    <h4 class="modal-title pull-left modal-lg">
      Alert Data
    </h4>
    <button
      type="button"
      class="btn-close close pull-right"
      aria-label="Close"
      (click)="modalRef?.hide()"
    >
      <span aria-hidden="true" class="visually-hidden">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    
    <div class="flex justify-content-center align-items-center" [formGroup]="form">
      <input
      formControlName="rawdDatedate"
      [owlDateTimeTrigger]="dt13"
      [owlDateTime]="dt13"
      [selectMode]="'range'"
      [max]="max"
      class="form-control mb-2"
      placeholder="Select Date Range"
      (dateTimeChange)="downloadalertData($event)"
     
    />
        <owl-date-time #dt13></owl-date-time>
      </div>
    
    </div>
