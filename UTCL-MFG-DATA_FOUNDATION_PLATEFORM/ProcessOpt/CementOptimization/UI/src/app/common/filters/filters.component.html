<div
  class="flex flex-col gap-2 w-full my-2"
  *ngIf="showRange || type === 'rangepicker'; else withoutRange"
>
  <div class="w-full">
    <form #myForm="ngForm">
      <div>
        <div
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 px-3 items-end"
        >
          <div class="flex flex-col gap-2">
            <label class="mb-0 text-[var(--text-color)]">Plant</label>
            <select
              class="w-full min-h-[29px] px-1 py-0.5 text-[13px] rounded-lg cursor-pointer outline-none bg-[var(--input-enable-bg)] border border-[var(--input-enable-border)] text-[var(--select-input-value)]"
              name="filtersData.Plant_Code"
              [(ngModel)]="filtersData.Plant_Code"
              (change)="
                getMillsBasesPlant(); getPlantname(filtersData.Plant_Code)
              "
              required
            >
              <option value="null" disabled>--Select Plant Here --</option>
              <option *ngFor="let item of plantData" [value]="item.value">
                {{ item.viewValue }}
              </option>
            </select>
          </div>
          <div class="flex flex-col gap-2">
            <label class="mb-0 text-[var(--text-color)]">Mill No.</label>
            <select
              class="w-full min-h-[29px] px-1 py-0.5 text-[13px] rounded-lg cursor-pointer outline-none bg-[var(--input-enable-bg)] border border-[var(--input-enable-border)] text-[var(--select-input-value)]"
              name="filtersData.Mill"
              (change)="getGradeBasesPlantMills()"
              [(ngModel)]="filtersData.Mill"
              required
            >
              <option [value]="null" disabled>--Select Mill Here --</option>
              <option *ngFor="let item of millsData" [value]="item.value">
                {{ item.viewValue }}
              </option>
            </select>
          </div>
          <div class="flex flex-col gap-2">
            <label class="mb-0 text-[var(--text-color)]">Grade</label>
            <select
              class="w-full min-h-[29px] px-1 py-0.5 text-[13px] rounded-lg cursor-pointer outline-none bg-[var(--input-enable-bg)] border border-[var(--input-enable-border)] text-[var(--select-input-value)]"
              name="filtersData.Grade"
              [(ngModel)]="filtersData.Grade"
              required
            >
              <option [value]="null" disabled>--Select Grade Here --</option>
              <option *ngFor="let item of gradeData" [value]="item.value">
                {{ item.viewValue }}
              </option>
            </select>
          </div>
          <div class="flex flex-col gap-2">
            <div class="flex flex-col" *ngIf="type == 'rangepicker'">
              <label class="text-[var(--text-color)]">Date Range</label>
              <app-datetimepicker
                [type]="type"
                [selectedRange]="filtersData.dateRange"
                (dateTimeRange)="onSelectDateRange($event)"
                class="m2-10"
              ></app-datetimepicker>
            </div>
            <div class="flex flex-col" *ngIf="type == 'datepicker'">
              <label class="text-[var(--text-color)]">Date</label>
              <app-datetimepicker
                [type]="type"
                [date_time]="filtersData.dateTime"
                (dateTime)="onSelectDatetime($event)"
                class="m2-10"
              ></app-datetimepicker>
            </div>
            <div class="flex flex-col" *ngIf="type == 'datepicker1'">
              <label class="mb-2 text-[var(--text-color)]">Date</label>
              <app-datetimepicker
                [type]="type"
                [date_times]="filtersData.dateTime"
                (dateTimes)="onSelectDatetimes($event)"
                class="m2-10"
              ></app-datetimepicker>
            </div>
          </div>
          <button
            type="button"
            class="h-[29px] w-[80px] shrink-0 cursor-pointer px-2 rounded-md border border-[var(--button-border)] bg-[var(--submit-button-bg)] hover:bg-[var(--submit-button-hover-bg)] text-[#111111] text-sm font-medium transition-all duration-200"
            [disabled]="
              !myForm.valid ||
              filtersData.Plant_Code === 'null' ||
              filtersData.Mill === 'null' ||
              filtersData.Grade === 'null'
            "
            (click)="onSubmit()"
          >
            Submit
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- Blaine Range -->
  <div class="w-full">
    <div class="card_apply rangeBox">
      <div class="flex items-center gap-4 px-3 py-1">
        <label class="text-[var(--text-color)] whitespace-nowrap shrink-0"
          >Select Desired Blaine Range:</label
        >
        <mat-radio-group
          class="flex flex-wrap items-center gap-3 text-[var(--text-color)]"
        >
          <mat-radio-button
            *ngFor="let item of rangeData"
            [value]="true"
            [checked]="item.Active === true"
            (change)="updateBlaineRangeRadio(item)"
            >{{ item.BLAIN_MIN }}-{{ item.BLAIN_MAX }}</mat-radio-button
          >
        </mat-radio-group>
        <button
          type="button"
          class="shrink-0 h-[29px] px-3 cursor-pointer rounded-md border border-[var(--button-border)] bg-[var(--submit-button-bg)] hover:bg-[var(--submit-button-hover-bg)] text-[#111111] text-sm font-medium transition-all duration-200"
          (click)="updateBlaineRange()"
        >
          Update
        </button>
      </div>
    </div>
  </div>
</div>

                  getMillsBasesPlant(); getPlantname(filtersData.Plant_Code)

                <option value="null" disabled>--Select Plant Here --</option>

                  {{ item.viewValue }}
                </option>

            </div>
            <div class="flex flex-col gap-2">
              <label class="mb-0 text-[var(--text-color)]">Mill No.</label>
              <select
                class="w-full min-h-[29px] px-1 py-0.5 text-[13px] rounded-lg cursor-pointer outline-none bg-[var(--input-enable-bg)] border border-[var(--input-enable-border)] text-[var(--select-input-value)]"
                name="filtersData.Mill"
                (change)="getGradeBasesPlantMills()"
                [(ngModel)]="filtersData.Mill"
                required
              >
                <option [value]="null" disabled>--Select Mill Here --</option>
                <option *ngFor="let item of millsData" [value]="item.value">
                  {{ item.viewValue }}
                </option>
              </select>
            </div>
            <div class="flex flex-col gap-2">
              <label class="mb-0 text-[var(--text-color)]">Grade</label>
              <select

                name="filtersData.Grade"
                [(ngModel)]="filtersData.Grade"
                required
              >
                <option [value]="null" disabled>--Select Grade Here --</option>
                <option *ngFor="let item of gradeData" [value]="item.value">
                  {{ item.viewValue }}

              </select>
            </div>
            <div class="flex flex-col gap-2">
              <div class="flex flex-col" *ngIf="type == 'rangepicker'">
                <label class="text-[var(--text-color)]">Date Range</label>
                <app-datetimepicker
                  [type]="type"

                  (dateTimeRange)="onSelectDateRange($event)"

              </div>
              <div class="flex flex-col" *ngIf="type == 'datepicker'">
                <label class="text-[var(--text-color)]">Date</label>
                <app-datetimepicker
                  [type]="type"
                  [date_time]="filtersData.dateTime"

              </div>

                <label class="text-[var(--text-color)]">Date</label>
                <app-datetimepicker
                  [type]="type"
                  [date_times]="filtersData.dateTime"
                  (dateTimes)="onSelectDatetimes($event)"
                ></app-datetimepicker>
              </div>
            </div>
            <button
              type="button"
              class="h-[29px] w-[80px] shrink-0 flex items-center justify-center cursor-pointer px-2 rounded-md border border-[var(--button-border)] bg-[var(--submit-button-bg)] hover:bg-[var(--submit-button-hover-bg)] text-[#111111] text-sm font-medium transition-all duration-200"
              [disabled]="
                !myForm.valid ||
                filtersData.Plant_Code === 'null' ||
                filtersData.Mill === 'null' ||
                filtersData.Grade === 'null'
              "
              (click)="onSubmit()"
            >
              Submit
            </button>
          </div>
      </div>
      </form>
    </div>
  </div>
</ng-template>
