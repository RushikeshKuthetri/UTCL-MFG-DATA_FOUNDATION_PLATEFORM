<div class="w-auto h-14 bg-[var(--bg-header)] px-6 flex items-center justify-between [box-shadow:var(--header-shadow)]">

  <!-- LEFT SIDE -->
  <div class="flex items-center gap-2">
    <img
      src="assets/adityabirlalogo.png"
      alt="Aditya Birla Logo"
      class="w-[51] h-[50px] object-contain"
    />

    <h1 class="text-sm sm:text-base md:text-lg lg:text-lg xl:text-xl
               text-[var(--header-text-color)] title-font font-medium  tracking-tight">
      Prakriti: UltraTech's Unified OT Data Platform
    </h1>
  </div>

  <!-- RIGHT SIDE -->
  <div class="profile flex items-center gap-3">
  <small class="text-[var(--header-text-color)]">
    <b>Welcome</b> {{ userName }}
  </small>

  <a (click)="logOut()" class="cursor-pointer">
    <i class='bx bx-log-out-circle text-[var(--header-text-color)] text-xl rotate-90'></i>
  </a>
</div>

</div>
