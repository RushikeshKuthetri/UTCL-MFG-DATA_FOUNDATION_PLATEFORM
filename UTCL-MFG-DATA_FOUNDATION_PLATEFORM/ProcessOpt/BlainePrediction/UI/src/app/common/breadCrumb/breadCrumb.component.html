<nav aria-label="breadcrumb" class="mb-1" *ngIf="current">
  <ol class="flex items-center gap-2 text-sm">

    <ng-container *ngFor="let crumb of current.crumbs; let i = index">

      <!-- Separator -->
      <span *ngIf="i > 0" class="text-[var(--card-subtle)]">/</span>

      <!-- Clickable crumb -->
      <button
        *ngIf="current.paths[i]; else staticCrumb"
        (click)="current.paths[i] && navigate(current.paths[i])"
        class="flex items-center gap-1 font-medium text-[var(--leftdrawer-text)] hover:text-[var(--card-border)] transition-colors duration-200 focus:outline-none"
      >
        <ng-container *ngIf="i === 0">
          <ng-container *ngTemplateOutlet="iconTpl; context: { $implicit: current.icon }"></ng-container>
        </ng-container>
        {{ crumb }}
      </button>

      <!-- Static crumb -->
      <ng-template #staticCrumb>
        <span
          class="flex items-center gap-1 text-[var(--leftdrawer-text)]"
          [class.font-semibold]="isLast(i)"
          [class.font-medium]="!isLast(i)"
        >
          <ng-container *ngIf="i === 0">
            <ng-container *ngTemplateOutlet="iconTpl; context: { $implicit: current.icon }"></ng-container>
          </ng-container>
          {{ crumb }}
        </span>
      </ng-template>

    </ng-container>
  </ol>
</nav>

<!-- Icon Template -->
<ng-template #iconTpl let-icon>
  <!-- Cogs icon — Process Optimization -->
  <svg *ngIf="icon === 'cogs'" xmlns="http://www.w3.org/2000/svg"
       class="w-[14px] h-[14px] mr-1 shrink-0" fill="currentColor" viewBox="0 0 20 20">
    <path fill-rule="evenodd"
      d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
      clip-rule="evenodd" />
  </svg>

  <!-- Default settings icon -->
  <svg *ngIf="icon !== 'cogs'" xmlns="http://www.w3.org/2000/svg"
       class="w-[14px] h-[14px] mr-1 shrink-0" fill="none"
       viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
    <circle cx="12" cy="12" r="3" />
  </svg>
</ng-template>
