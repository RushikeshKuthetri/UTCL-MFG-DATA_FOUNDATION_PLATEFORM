<div class="w-fit">

  <div
    class="flex items-center rounded-md px-2  transition-colors duration-300
           bg-[var(--search-bg)]
           border border-[var(--search-border)]"
  >

    <!-- Search Icon -->
    <span
      class="material-symbols-outlined mr-2 text-[18px]"
      style="color: var(--search-placeholder)"
    >
      search
    </span>

    <!-- Input -->
    <input
      type="text"
      [(ngModel)]="searchValue"
      (input)="onSearch()"
      placeholder="Search..."
      class="bg-transparent outline-none w-full text-sm text-[var(--text-color)]
             placeholder-[var(--search-placeholder)]"
    />

  </div>

</div>
