<ng-container *ngIf="mounted">
      <!-- ── MOBILE HAMBURGER ─────────────────────────────────────── -->
      <button *ngIf="!open" class="lg:hidden fixed top-20 left-4 z-50 p-2 rounded-lg bg-[var(--bg-leftdrawer)] shadow"
            (click)="openChange.emit(true)">
            <!-- Bars icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[var(--text-color)]" fill="currentColor"
                  viewBox="0 0 20 20">
                  <path fill-rule="evenodd"
                        d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"
                        clip-rule="evenodd" />
            </svg>
      </button>
      <!-- ── BACKDROP (mobile) ────────────────────────────────────── -->
      <div *ngIf="open" class="fixed inset-0 bg-[var(--bg-color)] backdrop-blur-sm z-30 lg:hidden"
            (click)="closeMobile()">
      </div>
      <!-- ══════════════════════════════════════════════════════════ -->
      <!-- SIDEBAR                                                    -->
      <!-- ══════════════════════════════════════════════════════════ -->
      <div class="fixed top-[68px] left-0 z-40  h-[calc(100dvh-98px)] overflow-y-auto flex flex-col rounded-r-3xl

           bg-[var(--bg-leftdrawer)] [box-shadow:var(--left-drawer-shadow)]

           transition-all duration-300" [class.lg:w-20]="collapsed" [class.lg:w-60]="!collapsed" [class.w-60]="true"
            [class.translate-x-0]="open" [class.-translate-x-full]="!open" [class.lg:translate-x-0]="true">
            <!-- ── MOBILE CLOSE BUTTON ─────────────────────────────── -->
            <div class="lg:hidden flex justify-end pt-3 pr-3 -mb-2">
                  <button (click)="closeMobile()">
                        <!-- X icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[var(--leftdrawer-text)]"
                              fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                  </button>
            </div>
            <!-- ── MENU LIST ────────────────────────────────────────── -->
            <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-1 mt-2" [class.px-3]="!collapsed"
                  [class.px-2]="collapsed" [class.items-center]="collapsed">
                  <ng-container *ngFor="let item of filteredMenu; let i = index">
                        <div>
                              <!-- ── PARENT MENU ITEM ──────────────────────────── -->
                              <div class="flex items-center py-2 rounded-xl transition-all cursor-pointer"
                                    [class.justify-center]="collapsed" [class.px-2]="collapsed"
                                    [class.px-3]="!collapsed" [class.pr-2]="!collapsed" [class.gap-3]="!collapsed"
                                    [ngClass]="{

              'bg-[var(--left-drawer-active-tab)] text-[#111111] font-semibold': !item.hasDropdown && isActiveRoute(item.path),

              'text-[var(--leftdrawer-text)] hover:bg-[var(--left-drawer-active-tab)] hover:text-[#111111]': item.hasDropdown || !isActiveRoute(item.path)

            }" (click)="item.hasDropdown ? handleParentClick(item) : handleNavigation(item)">
                                    <!-- Dropdown parent (not a link) -->
                                    <ng-container *ngIf="item.hasDropdown; else linkItem">
                                          <!-- Icon -->
                                          <ng-container
                                                *ngTemplateOutlet="iconTpl; context: { $implicit: item.icon }"></ng-container>
                                          <ng-container *ngIf="!collapsed">
                                                <span class="text-sm font-medium flex-1 min-w-0 truncate">{{ item.name
                                                      }}</span>
                                                <span class="ml-auto shrink-0 transition-transform duration-200">
                                                      <!-- ChevronDown / ChevronRight -->
                                                      <svg *ngIf="isDropdownOpen(item.name)"
                                                            xmlns="http://www.w3.org/2000/svg" class="w-4 h-4"
                                                            fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                                            stroke-width="2">
                                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                                  d="M19 9l-7 7-7-7" />
                                                      </svg>
                                                      <svg *ngIf="!isDropdownOpen(item.name)"
                                                            xmlns="http://www.w3.org/2000/svg" class="w-4 h-4"
                                                            fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                                            stroke-width="2">
                                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                                  d="M9 5l7 7-7 7" />
                                                      </svg>
                                                </span>
                                          </ng-container>
                                    </ng-container>
                                    <!-- Non-dropdown: router link -->
                                    <ng-template #linkItem>
                                          <div class="flex items-center w-full cursor-pointer gap-3">
                                                <ng-container
                                                      *ngTemplateOutlet="iconTpl; context: { $implicit: item.icon }"></ng-container>
                                                <span *ngIf="!collapsed" class="text-sm font-medium">{{ item.name
                                                      }}</span>
                                          </div>
                                    </ng-template>
                              </div>
                              <!-- /PARENT MENU ITEM -->
                              <!-- ── LEVEL-1 DROPDOWN CHILDREN ─────────────────── -->
                              <div *ngIf="item.hasDropdown && !collapsed && isDropdownOpen(item.name)"
                                    class="ml-[33.6px] mt-1 mb-2 flex flex-col">
                                    <ng-container *ngFor="let child of item.children; let ci = index">
                                          <div class="relative flex flex-col">
                                                <!-- Vertical line for non-last items -->
                                                <div *ngIf="ci !== item.children!.length - 1" class="absolute top-0"
                                                      [style.left.px]="VERTICAL_LINE_X" [style.width.px]="1"
                                                      [style.background-color]="lineColor"
                                                      [style.height]="getVerticalLineHeight(child, isDropdownOpen(item.name + '__' + child.name))">
                                                </div>
                                                <!-- ── LEVEL-1 ROW ── -->
                                                <div class="flex items-center cursor-pointer relative"
                                                      (click)="child.hasDropdown ? toggleDropdown(item.name + '__' + child.name) : null">
                                                      <!-- Connector SVG (level-1) -->
                                                      <svg [attr.width]="SVG_WIDTH" [attr.height]="SVG_HEIGHT"
                                                            [attr.viewBox]="'0 0 ' + SVG_WIDTH + ' ' + SVG_HEIGHT"
                                                            class="shrink-0" fill="none">
                                                            <!-- Last item, no nested open → curved L -->
                                                            <ng-container
                                                                  *ngIf="ci === item.children!.length - 1 && !isDropdownOpen(item.name + '__' + child.name)">
                                                                  <path [attr.d]="getCurvedPath()"
                                                                        [attr.stroke]="lineColor"
                                                                        [attr.stroke-width]="LINE_WIDTH"
                                                                        stroke-linecap="round"
                                                                        stroke-linejoin="round" />
                                                            </ng-container>
                                                            <!-- Last item with nested open OR non-last → T-branch -->
                                                            <!-- Non-last → vertical spine + same L-curve branch -->
                                                            <ng-container
                                                                  *ngIf="ci !== item.children!.length - 1 || isDropdownOpen(item.name + '__' + child.name)">
                                                                  <!-- Full vertical spine -->
                                                                  <line [attr.x1]="VERTICAL_LINE_X" y1="0"
                                                                        [attr.x2]="VERTICAL_LINE_X"
                                                                        [attr.y2]="SVG_HEIGHT" [attr.stroke]="lineColor"
                                                                        [attr.stroke-width]="LINE_WIDTH" />
                                                                  <!-- Same L-curve as getCurvedPath() -->
                                                                  <path [attr.d]="getCurvedPath()"
                                                                        [attr.stroke]="lineColor"
                                                                        [attr.stroke-width]="LINE_WIDTH"
                                                                        stroke-linecap="round"
                                                                        stroke-linejoin="round" />
                                                            </ng-container>
                                                      </svg>
                                                      <!-- Child with nested children -->
                                                      <ng-container *ngIf="child.hasDropdown; else childLink">
                                                            <div class="flex-1 flex items-center py-[6.4px] px-2 pr-2 rounded-lg transition-all text-sm min-w-0 gap-1"
                                                                  [ngClass]="{

                        'bg-[var(--left-drawer-active-tab)] text-[#111111] font-semibold': isChildActive(child.children, currentPath),

                        'text-[var(--leftdrawer-text)] hover:bg-[var(--left-drawer-active-tab)] hover:text-[#111111]': !isChildActive(child.children, currentPath)

                      }">
                                                                  <span class="flex-1 truncate">{{ child.name }}</span>
                                                                  <span
                                                                        class="ml-auto transition-transform duration-200 shrink-0">
                                                                        <svg *ngIf="isDropdownOpen(item.name + '__' + child.name)"
                                                                              xmlns="http://www.w3.org/2000/svg"
                                                                              class="w-[13px] h-[13px]" fill="none"
                                                                              viewBox="0 0 24 24" stroke="currentColor"
                                                                              stroke-width="2">
                                                                              <path stroke-linecap="round"
                                                                                    stroke-linejoin="round"
                                                                                    d="M19 9l-7 7-7-7" />
                                                                        </svg>
                                                                        <svg *ngIf="!isDropdownOpen(item.name + '__' + child.name)"
                                                                              xmlns="http://www.w3.org/2000/svg"
                                                                              class="w-[13px] h-[13px]" fill="none"
                                                                              viewBox="0 0 24 24" stroke="currentColor"
                                                                              stroke-width="2">
                                                                              <path stroke-linecap="round"
                                                                                    stroke-linejoin="round"
                                                                                    d="M9 5l7 7-7 7" />
                                                                        </svg>
                                                                  </span>
                                                            </div>
                                                      </ng-container>
                                                      <!-- Plain child link -->
                                                      <ng-template #childLink>
                                                            <div class="flex-1 min-w-0 cursor-pointer"
                                                                  (click)="handleNavigation(child); $event.stopPropagation()">
                                                                  <div class="py-[6.4px] px-2 rounded-lg transition-all text-sm truncate"
                                                                        [ngClass]="{

                          'bg-[var(--left-drawer-active-tab)] text-[#111111] font-semibold': currentPath === child.path,

                          'text-[var(--leftdrawer-text)] hover:bg-[var(--left-drawer-active-tab)] hover:text-[#111111]': currentPath !== child.path

                        }">

                                                                        {{ child.name }}
                                                                  </div>
                                                            </div>
                                                      </ng-template>
                                                </div>
                                                <!-- /LEVEL-1 ROW -->
                                                <!-- ── LEVEL-2 NESTED CHILDREN ─────────────── -->
                                                <div *ngIf="child.hasDropdown && isDropdownOpen(item.name + '__' + child.name)"
                                                      class="flex flex-col relative" [style.margin-left.px]="SVG_WIDTH">

                                                      <!-- Connecting line sirf tab jab ci last nahi ho -->
                                                      <div *ngIf="ci !== item.children!.length - 1" class="absolute"
                                                            [style.left.px]="-SVG_WIDTH + VERTICAL_LINE_X"
                                                            [style.top.px]="0"
                                                            [style.height]="getVerticalLineHeight(child, isDropdownOpen(item.name + '__' + child.name))"
                                                            [style.width.px]="1" [style.background-color]="lineColor">
                                                      </div>

                                                      <ng-container
                                                            *ngFor="let grandchild of child.children; let gi = index">
                                                            <div class="relative flex flex-col">
                                                                  <div class="flex items-center cursor-pointer"
                                                                        (click)="handleNavigation(grandchild); $event.stopPropagation()">
                                                                        <!-- Connector SVG (level-2) -->
                                                                        <svg [attr.width]="SVG_WIDTH"
                                                                              [attr.height]="SVG_HEIGHT"
                                                                              [attr.viewBox]="'0 0 ' + SVG_WIDTH + ' ' + SVG_HEIGHT"
                                                                              class="shrink-0" fill="none">
                                                                              <!-- Last grandchild → curved L -->
                                                                              <ng-container
                                                                                    *ngIf="gi === child.children!.length - 1">
                                                                                    <path [attr.d]="getCurvedPath()"
                                                                                          [attr.stroke]="lineColor"
                                                                                          [attr.stroke-width]="LINE_WIDTH"
                                                                                          stroke-linecap="round"
                                                                                          stroke-linejoin="round" />
                                                                              </ng-container>
                                                                              <!-- Non-last grandchild → T-branch -->
                                                                              <ng-container
                                                                                    *ngIf="gi !== child.children!.length - 1">
                                                                                    <line [attr.x1]="VERTICAL_LINE_X"
                                                                                          y1="0"
                                                                                          [attr.x2]="VERTICAL_LINE_X"
                                                                                          [attr.y2]="SVG_HEIGHT"
                                                                                          [attr.stroke]="lineColor"
                                                                                          [attr.stroke-width]="LINE_WIDTH" />
                                                                                    <path [attr.d]="getCurvedPath()"
                                                                                          [attr.stroke]="lineColor"
                                                                                          [attr.stroke-width]="LINE_WIDTH"
                                                                                          stroke-linecap="round"
                                                                                          stroke-linejoin="round" />
                                                                              </ng-container>
                                                                        </svg>
                                                                        <div class="flex-1 py-[6.4px] px-2 rounded-lg transition-all text-sm truncate"
                                                                              [ngClass]="{
                    'bg-[var(--left-drawer-active-tab)] text-[#111111] font-semibold': currentPath === grandchild.path,
                    'text-[var(--leftdrawer-text)] hover:bg-[var(--left-drawer-active-tab)] hover:text-[#111111]': currentPath !== grandchild.path
                }">
                                                                              {{ grandchild.name }}
                                                                        </div>
                                                                  </div>
                                                            </div>
                                                      </ng-container>
                                                </div>
                                                <!-- /LEVEL-2 NESTED CHILDREN -->
                                          </div>
                                    </ng-container>
                              </div>
                              <!-- /LEVEL-1 DROPDOWN CHILDREN -->
                        </div>
                  </ng-container>
            </div>
            <!-- /MENU LIST -->
            <!-- ── FOOTER (theme / collapse / power) ──────────────── -->
            <div [class.px-3]="!collapsed" [class.px-2]="collapsed" [class.py-2]="collapsed" [class.mx-2]="collapsed"
                  class="pb-2">
                  <div class="rounded-xl border bg-[var(--bg-leftdrawer-footer)] border-[color:var(--left-drawer-footer-border)]

           shadow-[0_2px_6px_rgba(0,0,0,0.05)] backdrop-blur-sm transition-all duration-300" [ngClass]="{

  'flex flex-col items-center justify-center gap-6 px-3 py-3': collapsed,

  'flex items-center justify-evenly lg:justify-between px-9 py-1 pb-1': !collapsed

}">
                        <!-- Theme -->
                        <button (click)="toggleTheme()"
                              class="focus:outline-none focus:ring-0 outline-none cursor-pointer mt-2">
                              <!-- Sun -->
                              <svg *ngIf="theme === 'dark'" xmlns="http://www.w3.org/2000/svg"
                                    class="w-[20px] h-[20px] text-yellow-400" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="5" />
                                    <path stroke-linecap="round"
                                          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                              </svg>
                              <!-- Moon -->
                              <svg *ngIf="theme !== 'dark'" xmlns="http://www.w3.org/2000/svg"
                                    class="w-[20px] h-[20px] text-[var(--text-color)]" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                          d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                              </svg>
                        </button>
                        <!-- Collapse -->
                        <button (click)="toggleCollapsed()"
                              class="hidden lg:block cursor-pointer text-[var(--text-color)] focus:outline-none focus:ring-0 outline-none mt-2">
                              <!-- Right (collapsed) -->
                              <svg *ngIf="collapsed" xmlns="http://www.w3.org/2000/svg" class="w-[20px] h-[20px]"
                                    fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" />
                                    <line x1="9" y1="3" x2="9" y2="21" />
                                    <path stroke-linecap="round" d="M14 9l3 3-3 3" />
                              </svg>
                              <!-- Left (expanded) -->
                              <svg *ngIf="!collapsed" xmlns="http://www.w3.org/2000/svg" class="w-[20px] h-[20px]"
                                    fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" />
                                    <line x1="15" y1="3" x2="15" y2="21" />
                                    <path stroke-linecap="round" d="M10 15l-3-3 3-3" />
                              </svg>
                        </button>
                        <!-- Power -->
                        <button
                              class="cursor-pointer text-[var(--text-color)] focus:outline-none focus:ring-0 outline-none mt-2">
                              <svg xmlns="http://www.w3.org/2000/svg" class="w-[20px] h-[20px]" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                          d="M18.364 5.636a9 9 0 11-12.728 0M12 3v9" />
                              </svg>
                        </button>
                  </div>
            </div>
            <!-- /FOOTER -->
      </div>
      <!-- /SIDEBAR -->
</ng-container>
<!-- ══════════════════════════════════════════════════════════════ -->
<!-- ICON TEMPLATE — maps icon name string → inline SVG           -->
<!-- ══════════════════════════════════════════════════════════════ -->

    <path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/>
    <path d="M12 12V8"/>
</svg>
            <svg *ngSwitchCase="'download'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0"

            <svg *ngSwitchCase="'report'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0"
