<div  class="row ng-star-inserted">
    <div class="w-full">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

    <div
      *ngFor="let item of datasorce; let i = index"
      class="bg-[var(--card-bg)] border border-[var(--form-border)] rounded-lg p-3 cursor-pointer text-center"
      (dblclick)="openModal(controlsecondsDataChart,item.Tag_Id,item.Display_Name,item.unitofmeasurement)"
      [title]="item.title"
    >

      <!-- Title -->
      <div class="mb-2">
        <h3 class="text-sm font-semibold text-[var(--text-color)]">
          {{item.Display_Name ? item.Display_Name : item.Generic_Name}}
        </h3>
      </div>

      <!-- Gauge -->
      <div class="flex justify-center">
        <ngx-gauge
          [size]="150"
          type="arch"
          [thick]="14"
          [value]="item.Value.toFixed(2)"
          [max]="item.Value + 250"
          cap="round"
          [append]="item.unitofmeasurement"
          [foregroundColor]="item.foregroundColor"
          backgroundColor="#fff"
          class="w-[150px] h-[96px] my-2"
        >
        </ngx-gauge>
      </div>

    </div>

  </div>
</div>

  <ng-template #controlsecondsDataChart>

  <div class="bg-[var(--card-bg)]  rounded-lg shadow-lg w-full max-w-4xl">

    <!-- Header -->
    <div class="flex justify-between items-center border-b border-[var(--form-border)] p-4">
      <h4 class="text-lg font-semibold">
        History data for {{display_name}}
      </h4>

       <button class="text-[var(--text-color)] hover:text-red-500 text-xl flex items-center justify-center"
                (click)="modalRef?.hide();closeModal()">
                <span class="material-symbols-outlined text-[20px]">
                    close
                </span>
            </button>
    </div>

    <!-- Body -->
    <div class="p-4">

      <!-- Date Range -->
      <div class="mb-4">
        <input
          class="border border-[var(--form-border)] rounded-md p-2 w-full"
          [owlDateTimeTrigger]="dt15"
          [owlDateTime]="dt15"
          [(ngModel)]="selectRange"
          (dateTimeChange)="onselectDateTimeRange($event)"
          [selectMode]="'range'"
          placeholder="Select Date Range"
          [max]="max"
        />
        <owl-date-time #dt15></owl-date-time>
      </div>

      <!-- Loader -->
      <div *ngIf="loadchart" class="flex justify-center py-6">
        <app-apploader>
          <div>Loading</div>
        </app-apploader>
      </div>

      <!-- Chart -->
      <app-control-line
        *ngIf="chartResult"
        [dateTimeData]="dateTimeData"
        [seriesData]="seriesdata"
        [displayName]="display_name"
        [unitMeasure]="unit_measure"
      >
      </app-control-line>

    </div>

  </div>

</ng-template>
