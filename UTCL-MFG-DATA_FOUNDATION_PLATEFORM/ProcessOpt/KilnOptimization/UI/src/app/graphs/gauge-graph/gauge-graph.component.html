    <div class="w-full">
        <div class="w-full">

            <mat-grid-list cols="3" rowHeight="1:0.950" class="w-full">

                <mat-grid-tile *ngFor="let item of datasorce; let i=index" class="cursor-pointer p-2"
                    (dblclick)="openModal(secondsDataChart,item.Tag_Id,item.Display_Name,item.unitofmeasurement)">

                    <!-- Card -->
                    <mat-card
                        class="bg-[var(--card-bg)] border border-[var(--form-border)] rounded-xl shadow-sm text-center px-4 pt-2 pb-0 hover:shadow-md transition"
                        [title]="item.title">

                        <!-- Header -->
                        <mat-card-header class="flex items-center justify-center mb-1">
                            <mat-card-title class="text-[13px] font-semibold text-[var(--text-color)] text-center">
                                {{item.Display_Name ? item.Display_Name : item.Generic_Name}}
                            </mat-card-title>
                        </mat-card-header>

                        <!-- Gauge -->
                        <div class="flex justify-center my-2">
                            <ngx-gauge [size]="150" type="arch" [thick]="14" [value]="item.Value.toFixed(2)"
                                [max]="item.Value+250" cap="round" [append]="item.unitofmeasurement"
                                [foregroundColor]="item.foregroundColor" backgroundColor="#fff"
                                class="w-[150px] h-[96px]">
                            </ngx-gauge>
                        </div>

                    </mat-card>

                </mat-grid-tile>

            </mat-grid-list>

        </div>
    </div>


    <ng-template #secondsDataChart>

        <div class="flex items-center justify-between border-b border-[var(--form-border)] pb-2 mb-4">

            <h4 class="text-[16px] font-semibold text-[var(--text-color)]">
                History Data for {{display_name}}
            </h4>

            <button class="text-[var(--text-color)] hover:text-red-500 text-xl flex items-center justify-center"
                (click)="modalRef?.hide();closeModal()">
                <span class="material-symbols-outlined text-[20px]">
                    close
                </span>
            </button>

        </div>

        <div>

            <!-- Date Range -->
            <div class="mb-4">

                <input
                    class="w-full px-3 py-1 text-[13px] rounded-lg border border-[var(--input-enable-border)] bg-[var(--input-enable-bg)] text-[var(--select-input-value)] focus:outline-none focus:ring-1 focus:ring-[#888]"
                    [owlDateTimeTrigger]="dt16" [owlDateTime]="dt16" [(ngModel)]="selectRange"
                    (dateTimeChange)="onselectDateTimeRange($event)" [selectMode]="'range'"
                    placeholder="Select Date Range" [max]="max">

                <owl-date-time #dt16></owl-date-time>

            </div>

            <!-- Loader -->
            <div *ngIf="loadchart" class="flex justify-center py-6">
                <app-apploader></app-apploader>
            </div>

            <!-- Chart -->
            <app-line-chart *ngIf="chartresult" [dateTimeData]="dateTimedata" [seriesData]="seriesData"
                [displayName]="display_name" [unitMeasure]="unit_measure">
            </app-line-chart>

        </div>

    </ng-template>
