<div class="w-full ">

  <div class="flex justify-between items-center">

    <h5 class="text-[18px] title-font font-medium  text-[var(--title)] mb-2">
      Recommendation
    </h5>

    

  </div>

  <div class="border border-[var(--form-border)] rounded-lg">


    <div class="flex flex-wrap">

      <!-- Filters (Plant, Kiln, Date Range, Submit) -->
      <div *ngIf="payload" class="flex-1">
        <app-filters type="rangepicker" [filtersData]="payload" [showRange]="false"
          (filterData)="onChangeFilter($event)">
        </app-filters>
      </div>

      <!-- ALL dropdown -->
      <div class="flex flex-col  pr-3  py-2">
        <label class="mb-2 text-[13px] font-semibold uppercase tracking-[0.02em] text-[var(--text-color)]">
          Parameter
        </label>
        <select class="min-h-[29px] px-3 text-[13px] rounded-lg w-[180px]
         bg-[var(--input-enable-bg)]
         border border-[var(--input-enable-border)]
         text-[var(--select-input-value)]
         outline-none
         transition-all duration-200
         cursor-pointer" [(ngModel)]="selectedOption" (change)="getRecommandParamterDropDown($event)">
          <option value="All">ALL</option>
          <option *ngFor="let data of parameterDropDownData" [value]="data.Tag_Id">
            {{data.UI_Display_Name ? data.UI_Display_Name : data.Generic_Description}}
          </option>
        </select>
      </div>

    </div>


    <div class=" rounded-lg  px-2">

      <!-- loader -->
      <div *ngIf="flags.showLoader" class="flex  justify-center items-center py-10">
        <app-loader></app-loader>
      </div>


      <div *ngIf="!flags.showLoader">


        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-2">






          <div class="flex w-full items-center justify-end gap-4 mb-1" *ngIf="recommendationDataSource.length !== 0">




            <!-- download button-->
            <button (click)="downloadRecommendationData()" class="flex items-center justify-center
          text-[var(--text-color)]
          hover:text-[var(--accent-color)]
          transition-colors duration-200
         dark:hover:text-blue-400">
              <span class="material-symbols-outlined text-[22px]">
                download
              </span>
            </button>

          </div>
        </div>


        <div class="overflow-x-auto  rounded-lg border border-[var(--form-border)]  max-h-[270px] custom-scrollbar mb-1"
          *ngIf="recommendationDataSource.length !== 0">

          <table mat-table matSort (matSortChange)="sortData($event)" [dataSource]="dataSource"
            class="min-w-full  overflow-y-auto ">

            <!-- columns from api -->
            <ng-container [matColumnDef]="item" *ngFor="let item of keysList; let i=index">

              <th mat-header-cell *matHeaderCellDef [mat-sort-header]="item"
                class="px-2 py-2 text-left font-semibold text-black">
                {{displayedColumn[i]}}
              </th>

              <td mat-cell *matCellDef="let element"
                class=" text-center py-2 border-b text-sm text-[var(--text-color)]">
                {{element[item] ? element[item] : 'N/A'}}
              </td>

            </ng-container>


            <tr mat-header-row *matHeaderRowDef="keysList ; sticky: true" class="!bg-orange-400 text-black">
            </tr>


            <tr mat-row *matRowDef="let row; columns: keysList;" class="hover:bg-[var(--table-hover)] transition">
            </tr>

          </table>
        </div>

        <div class="mx-2.5 flex flex-col items-center justify-center h-40 rounded-lg"
          *ngIf="recommendationDataSource.length === 0">
          <!-- Icon -->
          <div class="text-3xl mb-3 zoom-animation">🔍</div>

          <!-- Title -->
          <h2 class="text-lg font-semibold text-[var(--leftdrawer-text)] mb-2">
            No Data Found
          </h2>

          <!-- Description -->
          <p class="text-sm text-[var(--card-subtle)] mb-1">
            Try changing the filters or refresh the data
          </p>
        </div>


        <div class=" text-[var(--text-color)] flex items-end gap-4 justify-end rounded-md text-[14px]">
          <mat-paginator [length]="100" [pageSize]="10" #paginator [pageSizeOptions]="[5, 10, 25, 100]"
            aria-label="Select page">
          </mat-paginator>
        </div>

      </div>

    </div>

  </div>
</div>
