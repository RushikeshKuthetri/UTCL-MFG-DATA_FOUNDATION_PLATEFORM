  <!-- Modal Header -->
<div class="flex items-center justify-between border-b border-[var(--form-border)] px-5 py-3">

  <h4 class="text-lg font-semibold text-[var(--title)]">
    Raw Data
  </h4>

  <button
    type="button"
    aria-label="Close"
    (click)="modalRef?.hide()"
    class="text-xl font-bold text-[var(--text-color)] hover:text-red-500 transition"
  >
    ✕
  </button>

</div>


<!-- Modal Body -->
<div class="px-5 py-4">

  <div class="flex justify-center items-center" [formGroup]="form">

    <input
      formControlName="rawdDatedate"
      [owlDateTimeTrigger]="dt12"
      [owlDateTime]="dt12"
      [selectMode]="'range'"
      [max]="max"
      placeholder="Select Date Range"
      (dateTimeChange)="downloadRawdata($event)"
      class="w-full max-w-sm
             px-3 py-2
             rounded-md
             border border-[var(--form-border)]
             bg-[var(--input-bg)]
             text-[var(--text-color)]
             placeholder-[var(--search-placeholder)]
             focus:outline-none focus:ring-2 focus:ring-orange-400"
    />

    <owl-date-time #dt12></owl-date-time>

  </div>

</div>
