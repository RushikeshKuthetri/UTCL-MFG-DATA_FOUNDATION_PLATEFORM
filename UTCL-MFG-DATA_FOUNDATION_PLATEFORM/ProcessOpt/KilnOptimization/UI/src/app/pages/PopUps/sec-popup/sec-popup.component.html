<div class="fixed inset-0 flex items-center justify-center bg-black/50 z-50">

  
  <div class="w-[80vw] max-w-5xl rounded-lg shadow-lg 
              bg-[var(--card-bg)] border border-[var(--form-border)]">

   
    <div class="flex items-center justify-between 
                px-5 py-3 border-b border-[var(--form-border)]">

      <h4 class="text-lg font-semibold text-[var(--title)]">
        Parameter Trend
      </h4>

      <button
        (click)="modalRef?.hide()"
        class="text-xl font-bold text-[var(--text-color)] 
               hover:text-red-500 transition   btn-close close pull-right"
      >
      <span aria-hidden="true" class="visually-hidden">&times;</span>
      </button>

    </div>

    <!-- Modal Body -->
    <div class="p-5">

      <div class="w-full h-[400px]">

        <div class="sec-line w-full h-full" [chart]="chart4"></div>

      </div>

    </div>

  </div>

</div>
