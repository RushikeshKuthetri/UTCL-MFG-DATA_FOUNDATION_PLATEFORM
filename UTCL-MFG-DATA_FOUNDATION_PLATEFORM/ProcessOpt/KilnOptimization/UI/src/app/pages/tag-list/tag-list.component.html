<div class="w-full">

  <div class="flex justify-between items-center">

    <h5 class="text-[18px] title-font font-medium  text-[var(--title)] mb-2">
      Tag List
    </h5>


  </div>



  <div class="border border-[var(--form-border)] rounded-lg">

    <!-- inputs -->
    <div class="rounded-xl mb-4" *ngIf="payload">
      <app-filters type="rangepicker" [filtersData]="payload" [showRange]="false" (filterData)="onChangeFilter($event)">
      </app-filters>
    </div>

    <div class="rounded-lg">


      <div *ngIf="flags.showLoader" class="flex justify-center items-center py-10">
        <app-loader></app-loader>
      </div>


      <div *ngIf="!flags.showLoader" class="px-2 mb-2">


        <div class="flex items-center justify-end mb-4" *ngIf="disturbanceDataSource.length !== 0">

          <!-- pagination -->
          <div class="text-[var(--text-color)] flex items-center gap-4 rounded-md">
            <mat-paginator [length]="100" [pageSize]="10" #paginator [pageSizeOptions]="[5,10,25,100]"
              aria-label="Select page">
            </mat-paginator>
          </div>


          <button (click)="downloadAlertData()" class="flex items-center justify-center
          text-[var(--text-color)]
          hover:text-[var(--accent-color)]
          transition-colors duration-200 ml-3">
            <span class="material-symbols-outlined text-[22px]">
              download
            </span>
          </button>

        </div>


        <div class="overflow-x-auto  rounded-lg border border-[var(--form-border)] h-[470px] custom-scrollbar"
          *ngIf="disturbanceDataSource.length !== 0">

          <table mat-table matSort (matSortChange)="sortData($event)" [dataSource]="dataSource"
            class="min-w-full overflow-y-auto ">


            <ng-container [matColumnDef]="item" *ngFor="let item of keysList; let i=index">

              <th mat-header-cell *matHeaderCellDef [mat-sort-header]="item"
                class="px-4 py-2 text-left font-semibold text-black">
                {{displayedColumn[i]}}
              </th>

              <td mat-cell *matCellDef="let element" class="px-4 py-2 border-b text-sm text-[var(--text-color)]">
                {{element[item] ? element[item] : 'N/A'}}
              </td>

            </ng-container>


            <tr mat-header-row *matHeaderRowDef="keysList; sticky: true" class="!bg-orange-400 text-black"></tr>

            <tr mat-row *matRowDef="let row; columns: keysList" class="hover:bg-[var(--table-hover)] transition"></tr>

          </table>

        </div>
        <div class="flex flex-col items-center justify-center h-40 rounded-lg"
          *ngIf="disturbanceDataSource.length === 0">
          <div class="text-3xl mb-3 zoom-animation">🔍</div>

          <!-- Title -->
          <h2 class="text-lg font-semibold text-[var(--leftdrawer-text)] mb-2">
            No Data Found
          </h2>

          <!-- Description -->
          <p class="text-sm text-[var(--card-subtle)] mb-1">
            Try changing the filters or refresh the data
          </p>
        </div>
      </div>

    </div>

  </div>

</div>
